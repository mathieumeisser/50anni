<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Board · Mathieu · 50 · Via Alta Valle Maggia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf9f7; --dark: #1a1a18; --mid: #5c5c56; --light: #9e9e94;
      --accent: #8b7355; --accent-light: #d4c4a8; --border: #e8e6e0; --gap: 96px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; font-weight: 300; background: var(--cream); color: var(--dark); line-height: 1.7; font-size: 16px; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 48px; background: rgba(250,249,247,0.93); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dark); text-decoration: none; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--dark); }
    .nav-links a.active { color: var(--dark); border-bottom: 1px solid var(--dark); padding-bottom: 1px; }
    .lang-switcher { display: flex; gap: 6px; align-items: center; }
    .lang-btn { background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--light); padding: 2px 4px; transition: color 0.2s; }
    .lang-btn.active { color: var(--dark); border-bottom: 1px solid var(--dark); }
    .lang-sep { color: var(--border); }

    /* PAGE HEADER */
    .page-header { background: var(--dark); padding: 140px 24px 80px; text-align: center; }
    .page-header-eyebrow { font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 20px; }
    .page-header-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 8vw, 5.5rem); font-weight: 300; color: #fff; line-height: 1; letter-spacing: -0.01em; }
    .page-header-title em { font-style: italic; color: var(--accent-light); }
    .page-header-sub { margin-top: 20px; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

    /* SHARED */
    .section-wrap { max-width: 920px; margin: 0 auto; padding: var(--gap) 24px; }
    .section-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: block; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 300; line-height: 1.15; margin-bottom: 28px; }
    .section-title em { font-style: italic; }
    .body-text { color: var(--mid); max-width: 640px; line-height: 1.85; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-label { font-size: 0.67rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); }
    .form-input, .form-textarea { font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 300; color: var(--dark); background: white; border: 1px solid var(--border); padding: 11px 14px; outline: none; transition: border-color 0.2s; width: 100%; border-radius: 0; }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 90px; }
    .btn { display: inline-block; padding: 13px 36px; background: var(--dark); color: var(--cream); font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: var(--accent); }
    .form-success { display: none; padding: 20px 24px; background: #f5f0e8; border-left: 3px solid var(--accent); margin-top: 24px; font-size: 0.88rem; color: var(--mid); }

    /* MESSAGE BOARD */
    .mb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 40px; }
    .mb-card { background: white; border: 1px solid var(--border); overflow: hidden; transition: box-shadow 0.2s; }
    .mb-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .mb-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--border); }
    .mb-photo-placeholder { width: 100%; aspect-ratio: 4/3; background: var(--border); display: flex; align-items: center; justify-content: center; }
    .mb-photo-placeholder span { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--light); }
    .mb-body { padding: 20px 22px; }
    .mb-author { font-weight: 400; font-size: 0.86rem; color: var(--dark); margin-bottom: 4px; }
    .mb-location { font-size: 0.74rem; color: var(--accent); margin-bottom: 10px; }
    .mb-msg { font-size: 0.86rem; color: var(--mid); line-height: 1.75; font-style: italic; }
    .mb-date { font-size: 0.68rem; color: var(--light); margin-top: 12px; letter-spacing: 0.06em; }

    /* MESSAGE FORM */
    .mb-form-wrap { margin-top: 48px; padding: 36px; background: white; border: 1px solid var(--border); }
    .mb-form-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; margin-bottom: 24px; }
    .mb-grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .mb-full { grid-column: 1 / -1; }

    /* Photo upload zone */
    .photo-upload-zone { border: 1px dashed var(--accent-light); padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
    .photo-upload-zone:hover { border-color: var(--accent); background: #fdf9f4; }
    .photo-upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-upload-icon { font-size: 1.4rem; margin-bottom: 8px; }
    .photo-upload-label { font-size: 0.76rem; color: var(--mid); }
    .photo-upload-sub { font-size: 0.68rem; color: var(--light); margin-top: 4px; }
    .photo-preview-wrap { position: relative; display: inline-block; }
    .photo-preview { max-width: 100%; max-height: 200px; border: 1px solid var(--border); display: block; margin: 0 auto; }
    .photo-remove { position: absolute; top: -8px; right: -8px; background: var(--dark); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* FOOTER */
    footer { text-align: center; padding: 56px 24px; border-top: 1px solid var(--border); }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; margin-bottom: 10px; }
    .footer-info { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light); }

    /* RESPONSIVE */
    @media (max-width: 800px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .mb-grid-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="main-nav">
  <a href="index.html" class="nav-logo">Mathieu · 50</a>
  <ul class="nav-links">
    <li><a href="index.html#options"       data-t="nav_options"></a></li>
    <li><a href="index.html#programme"     data-t="nav_programme"></a></li>
    <li><a href="index.html#map-section"   data-t="nav_map"></a></li>
    <li><a href="index.html#accommodation" data-t="nav_accom"></a></li>
    <li><a href="index.html#rsvp"          data-t="nav_rsvp"></a></li>
    <li><a href="photos.html"              data-t="nav_photos"></a></li>
    <li><a href="messageboard.html" class="active" data-t="nav_messages"></a></li>
  </ul>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <span class="lang-sep">·</span>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <span class="lang-sep">·</span>
    <button class="lang-btn" onclick="setLang('it')">IT</button>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <p class="page-header-eyebrow" data-t="hero_eyebrow"></p>
  <h1 class="page-header-title" data-t="page_title_html" id="page-title"></h1>
  <p class="page-header-sub" data-t="page_subtitle"></p>
</div>

<!-- MESSAGE BOARD -->
<div class="section-wrap" id="guestbook">
  <span class="section-label" data-t="gb_label"></span>
  <h2 class="section-title" data-t="gb_title"></h2>
  <p class="body-text" data-t="gb_intro"></p>

  <!-- Messages feed -->
  <div class="mb-grid" id="mb-feed">
    <!-- Sample message -->
    <div class="mb-card">
      <div class="mb-photo-placeholder"><span>Photo</span></div>
      <div class="mb-body">
        <div class="mb-author">Marie &amp; Pierre</div>
        <div class="mb-location">📍 Geneva</div>
        <div class="mb-msg">"Looking forward to celebrating your 50th with you in the mountains, Mathieu!"</div>
        <div class="mb-date">March 2026</div>
      </div>
    </div>
  </div>

  <!-- Post a message form -->
  <div class="mb-form-wrap">
    <p class="mb-form-title" data-t="gb_form_title"></p>
    <form id="mb-form" onsubmit="submitMessage(event)">
      <div class="mb-grid-form">
        <div class="form-group">
          <label class="form-label" data-t="gb_name"></label>
          <input class="form-input" type="text" name="mb_name" required />
        </div>
        <div class="form-group">
          <label class="form-label" data-t="gb_from"></label>
          <input class="form-input" type="text" name="mb_from" placeholder="Zürich, Paris…" />
        </div>
        <div class="form-group mb-full">
          <label class="form-label" data-t="gb_wish"></label>
          <textarea class="form-textarea" name="mb_msg" required style="min-height:110px"></textarea>
        </div>
        <div class="form-group mb-full">
          <label class="form-label" data-t="gb_photo"></label>
          <div class="photo-upload-zone" id="upload-zone">
            <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)" />
            <div id="upload-placeholder">
              <div class="photo-upload-icon">🖼</div>
              <div class="photo-upload-label" data-t="gb_photo_label"></div>
              <div class="photo-upload-sub" data-t="gb_photo_sub"></div>
            </div>
            <div id="upload-preview" style="display:none">
              <div class="photo-preview-wrap">
                <img id="photo-preview-img" class="photo-preview" />
                <button class="photo-remove" type="button" onclick="removePhoto()">✕</button>
              </div>
            </div>
          </div>
        </div>
        <div class="mb-full">
          <button class="btn" type="submit" data-t="gb_submit"></button>
        </div>
      </div>
    </form>
    <div class="form-success" id="mb-ok" data-t="gb_success"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p class="footer-logo">Mathieu · 50</p>
  <p class="footer-info">16 – 20 · IX · 2026 · Via Alta Valle Maggia · Ticino · Switzerland</p>
</footer>

<script>
// ── TRANSLATIONS ──────────────────────────────────────────────────────
const T = {
  en: {
    nav_options:'Options', nav_programme:'Programme', nav_map:'Map', nav_accom:'Stay', nav_rsvp:'RSVP', nav_photos:'Photos', nav_messages:'Messages',
    hero_eyebrow:'16 – 20 September 2026 · Valle Maggia, Ticino',
    page_title:'Message Board',
    page_subtitle:'Leave a word for Mathieu',
    gb_label:'Messages', gb_title:'Message Board.',
    gb_intro:'Leave a message, a wish, or a photo — whether or not you can join. Everyone is welcome to post here.',
    gb_form_title:'Post a message',
    gb_name:'Your name', gb_from:'Where are you from?', gb_wish:'Your message',
    gb_photo:'Photo (optional)', gb_photo_label:'Click or drag a photo here',
    gb_photo_sub:'JPG or PNG · Max 5 MB',
    gb_submit:'Post message',
    gb_success:'✓ Your message has been posted! Thank you.',
  },
  fr: {
    nav_options:'Options', nav_programme:'Programme', nav_map:'Carte', nav_accom:'Séjour', nav_rsvp:'RSVP', nav_photos:'Photos', nav_messages:'Messages',
    hero_eyebrow:'16 – 20 Septembre 2026 · Valle Maggia, Tessin',
    page_title:'Tableau de messages',
    page_subtitle:'Laissez un mot pour Mathieu',
    gb_label:'Messages', gb_title:'Tableau de messages.',
    gb_intro:"Laissez un message, un vœu ou une photo — que vous puissiez venir ou non. Tout le monde est le bienvenu.",
    gb_form_title:'Poster un message',
    gb_name:'Votre nom', gb_from:"D'où venez-vous ?", gb_wish:'Votre message',
    gb_photo:'Photo (optionnel)', gb_photo_label:'Cliquez ou glissez une photo ici',
    gb_photo_sub:'JPG ou PNG · Max 5 Mo',
    gb_submit:'Publier',
    gb_success:'✓ Votre message a été publié ! Merci.',
  },
  it: {
    nav_options:'Opzioni', nav_programme:'Programma', nav_map:'Mappa', nav_accom:'Soggiorno', nav_rsvp:'RSVP', nav_photos:'Foto', nav_messages:'Messaggi',
    hero_eyebrow:'16 – 20 Settembre 2026 · Valle Maggia, Ticino',
    page_title:'Bacheca messaggi',
    page_subtitle:'Lascia un messaggio per Mathieu',
    gb_label:'Messaggi', gb_title:'Bacheca messaggi.',
    gb_intro:'Lascia un messaggio, un augurio o una foto — che tu possa venire o no. Tutti sono benvenuti.',
    gb_form_title:'Scrivi un messaggio',
    gb_name:'Il tuo nome', gb_from:'Da dove vieni?', gb_wish:'Il tuo messaggio',
    gb_photo:'Foto (opzionale)', gb_photo_label:'Clicca o trascina una foto qui',
    gb_photo_sub:'JPG o PNG · Max 5 MB',
    gb_submit:'Pubblica',
    gb_success:'✓ Il tuo messaggio è stato pubblicato! Grazie.',
  }
};

let lang = 'en';

function setLang(l) {
  lang = l;
  const t = T[l];
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.dataset.t;
    if (t[k] !== undefined) el.textContent = t[k];
  });
  document.getElementById('page-title').textContent = t.page_title;
}

// ── MESSAGE BOARD ─────────────────────────────────────────────────────
const MESSAGE_BOARD_URL = 'https://script.google.com/macros/s/AKfycbyTPn8MPv_CRJ9rVQs5BQ9HCJHFQMr_73q1vVFibnxP1DS8Za2Okcm_r88Ix0o0ug1shA/exec';

let photoBase64 = null;

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('Photo must be under 5 MB'); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('photo-preview-img').src = photoBase64;
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('upload-preview').style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  photoBase64 = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('upload-placeholder').style.display = 'block';
  document.getElementById('upload-preview').style.display = 'none';
}

async function submitMessage(e) {
  e.preventDefault();
  const f = e.target;
  const btn = f.querySelector('button[type="submit"]');
  btn.textContent = '…'; btn.disabled = true;

  const name = f.mb_name.value.trim();
  const from = f.mb_from.value.trim();
  const msg = f.mb_msg.value.trim();
  const now = new Date().toLocaleDateString('en-GB', {month:'long', year:'numeric'});

  addMessageCard({ name, from, msg, img: photoBase64, date: now });

  const payload = { name, from, msg, date: now };
  if (photoBase64) payload.imageData = photoBase64;
  try {
    if (MESSAGE_BOARD_URL !== 'YOUR_MESSAGE_BOARD_APPS_SCRIPT_URL')
      await fetch(MESSAGE_BOARD_URL, { method:'POST', mode:'no-cors', body: new URLSearchParams(payload) });
  } catch(_) {}

  f.reset(); removePhoto();
  btn.textContent = T[lang].gb_submit; btn.disabled = false;
  document.getElementById('mb-ok').style.display = 'block';
  document.getElementById('mb-ok').textContent = T[lang].gb_success;
  setTimeout(() => document.getElementById('mb-ok').style.display = 'none', 4000);
  if (MESSAGE_BOARD_URL !== 'YOUR_MESSAGE_BOARD_APPS_SCRIPT_URL')
    setTimeout(loadMessages, 2000);
}

function fixDriveImgUrl(url) {
  if (!url) return url;
  if (url.includes('drive.google.com/uc')) {
    const m = url.match(/[?&]id=([^&]+)/);
    if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w900';
  }
  return url;
}

function addMessageCard({ name, from, msg, img, date }) {
  const imgSrc = fixDriveImgUrl(img);
  const card = document.createElement('div');
  card.className = 'mb-card';
  card.innerHTML = `
    ${imgSrc
      ? `<img class="mb-photo" src="${imgSrc}" alt="${esc(name)}'s photo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
         <div class="mb-photo-placeholder" style="display:none"><span>Photo unavailable</span></div>`
      : `<div class="mb-photo-placeholder"><span>No photo</span></div>`}
    <div class="mb-body">
      <div class="mb-author">${esc(name)}</div>
      ${from ? `<div class="mb-location">📍 ${esc(from)}</div>` : ''}
      <div class="mb-msg">"${esc(msg)}"</div>
      <div class="mb-date">${date}</div>
    </div>`;
  const feed = document.getElementById('mb-feed');
  feed.insertBefore(card, feed.firstChild);
  card.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

async function loadMessages() {
  if (MESSAGE_BOARD_URL === 'YOUR_MESSAGE_BOARD_APPS_SCRIPT_URL') return;
  try {
    const res  = await fetch(MESSAGE_BOARD_URL, { redirect:'follow' });
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) return;
    const feed = document.getElementById('mb-feed');
    feed.innerHTML = '';
    data.forEach(m => addMessageCard({ name:m.name, from:m.from, msg:m.msg, img:m.img||null, date:m.date }));
  } catch(_) {}
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──────────────────────────────────────────────────────────────
const initLang = new URLSearchParams(window.location.search).get('lang');
setLang(['en','fr','it'].includes(initLang) ? initLang : 'en');
window.addEventListener('load', loadMessages);
</script>
</body>
</html>
