<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos · Mathieu · 50 · Via Alta Valle Maggia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf9f7; --dark: #1a1a18; --mid: #5c5c56; --light: #9e9e94;
      --accent: #8b7355; --accent-light: #d4c4a8; --border: #e8e6e0; --gap: 96px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; font-weight: 300; background: var(--cream); color: var(--dark); line-height: 1.7; font-size: 16px; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 48px; background: rgba(250,249,247,0.93); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dark); text-decoration: none; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--dark); }
    .nav-links a.active { color: var(--dark); border-bottom: 1px solid var(--dark); padding-bottom: 1px; }
    .lang-switcher { display: flex; gap: 6px; align-items: center; }
    .lang-btn { background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--light); padding: 2px 4px; transition: color 0.2s; }
    .lang-btn.active { color: var(--dark); border-bottom: 1px solid var(--dark); }
    .lang-sep { color: var(--border); }

    /* PAGE HEADER */
    .page-header { background: var(--dark); padding: 140px 24px 80px; text-align: center; }
    .page-header-eyebrow { font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 20px; }
    .page-header-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 8vw, 5.5rem); font-weight: 300; color: #fff; line-height: 1; letter-spacing: -0.01em; }
    .page-header-title em { font-style: italic; color: var(--accent-light); }
    .page-header-sub { margin-top: 20px; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

    /* SHARED */
    .section-wrap { max-width: 920px; margin: 0 auto; padding: var(--gap) 24px; }
    .section-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: block; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 300; line-height: 1.15; margin-bottom: 28px; }
    .body-text { color: var(--mid); max-width: 640px; line-height: 1.85; }

    /* GALLERY */
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 40px; }
    .gal-ph { aspect-ratio: 4/3; background: var(--border); display: flex; align-items: center; justify-content: center; }
    .gal-ph span { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--light); }

    /* FOOTER */
    footer { text-align: center; padding: 56px 24px; border-top: 1px solid var(--border); }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; margin-bottom: 10px; }
    .footer-info { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light); }

    /* RESPONSIVE */
    @media (max-width: 800px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="main-nav">
  <a href="index.html" class="nav-logo">Mathieu · 50</a>
  <ul class="nav-links">
    <li><a href="index.html#options"       data-t="nav_options"></a></li>
    <li><a href="index.html#programme"     data-t="nav_programme"></a></li>
    <li><a href="index.html#map-section"   data-t="nav_map"></a></li>
    <li><a href="index.html#accommodation" data-t="nav_accom"></a></li>
    <li><a href="index.html#rsvp"          data-t="nav_rsvp"></a></li>
    <li><a href="photos.html" class="active" data-t="nav_photos"></a></li>
    <li><a href="messageboard.html"        data-t="nav_messages"></a></li>
  </ul>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <span class="lang-sep">·</span>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <span class="lang-sep">·</span>
    <button class="lang-btn" onclick="setLang('it')">IT</button>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <p class="page-header-eyebrow" data-t="hero_eyebrow"></p>
  <h1 class="page-header-title" id="page-title"></h1>
  <p class="page-header-sub" data-t="page_subtitle"></p>
</div>

<!-- GALLERY -->
<div class="section-wrap" id="gallery">
  <span class="section-label" data-t="gallery_label"></span>
  <h2 class="section-title" data-t="gallery_title"></h2>
  <p class="body-text" data-t="gallery_body"></p>
  <div class="gallery-grid">
    <div class="gal-ph"><span>Photo</span></div>
    <div class="gal-ph"><span>Photo</span></div>
    <div class="gal-ph"><span>Photo</span></div>
    <div class="gal-ph"><span>Photo</span></div>
    <div class="gal-ph"><span>Photo</span></div>
    <div class="gal-ph"><span>Photo</span></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p class="footer-logo">Mathieu · 50</p>
  <p class="footer-info">16 – 20 · IX · 2026 · Via Alta Valle Maggia · Ticino · Switzerland</p>
</footer>

<script>
// ── TRANSLATIONS ──────────────────────────────────────────────────────
const T = {
  en: {
    nav_options:'Options', nav_programme:'Programme', nav_map:'Map', nav_accom:'Stay',
    nav_rsvp:'RSVP', nav_photos:'Photos', nav_messages:'Messages',
    hero_eyebrow:'16 – 20 September 2026 · Valle Maggia, Ticino',
    page_title:'Photos',
    page_subtitle:'Memories from the journey',
    gallery_label:'Memories', gallery_title:'Photos.',
    gallery_body:'Photos from the journey will appear here after the event. Come back after September 20th.',
  },
  fr: {
    nav_options:'Options', nav_programme:'Programme', nav_map:'Carte', nav_accom:'Séjour',
    nav_rsvp:'RSVP', nav_photos:'Photos', nav_messages:'Messages',
    hero_eyebrow:'16 – 20 Septembre 2026 · Valle Maggia, Tessin',
    page_title:'Photos',
    page_subtitle:'Souvenirs du voyage',
    gallery_label:'Souvenirs', gallery_title:'Photos.',
    gallery_body:'Les photos du voyage apparaîtront ici. Revenez après le 20 septembre.',
  },
  it: {
    nav_options:'Opzioni', nav_programme:'Programma', nav_map:'Mappa', nav_accom:'Soggiorno',
    nav_rsvp:'RSVP', nav_photos:'Foto', nav_messages:'Messaggi',
    hero_eyebrow:'16 – 20 Settembre 2026 · Valle Maggia, Ticino',
    page_title:'Foto',
    page_subtitle:'Ricordi del viaggio',
    gallery_label:'Ricordi', gallery_title:'Foto.',
    gallery_body:"Le foto del viaggio appariranno qui dopo l'evento. Torna dopo il 20 settembre.",
  }
};

let lang = 'en';

function setLang(l) {
  lang = l;
  const t = T[l];
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.dataset.t;
    if (t[k] !== undefined) el.textContent = t[k];
  });
  document.getElementById('page-title').textContent = t.page_title;
}

// ── INIT ──────────────────────────────────────────────────────────────
const initLang = new URLSearchParams(window.location.search).get('lang');
setLang(['en','fr','it'].includes(initLang) ? initLang : 'en');
</script>
</body>
</html>
